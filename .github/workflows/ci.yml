name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin \
            libgeos-dev libproj-dev \
            libgl1-mesa-glx libegl1 \
            xvfb \
            python3-pyqt6 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # PyQt6-WebEngine berat dan tidak diperlukan untuk unit test
          pip install \
            geopandas>=0.14.0 \
            psycopg2-binary>=2.9.0 \
            shapely>=2.0.0 \
            matplotlib>=3.7.0 \
            sqlalchemy>=2.0.0 \
            GeoAlchemy2>=0.14.0 \
            python-dotenv>=1.0.0 \
            pyproj>=3.5.0 \
            fiona>=1.9.0 \
            pandas>=2.0.0 \
            numpy>=1.24.0 \
            Pillow>=10.0.0 \
            folium>=0.15.0 \
            pytest>=7.0.0 \
            pytest-cov

      - name: Install PyQt6 (headless)
        run: |
          pip install PyQt6>=6.6.0
        # PyQt6-WebEngine di-skip — terlalu berat untuk CI dan tidak diuji unit test

      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          python -m pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=core \
            --cov=utils \
            --cov-report=term-missing \
            --cov-report=xml \
            -p no:warnings

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 core/ utils/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=__pycache__,.venv \
            --statistics \
            --count
